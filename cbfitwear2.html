<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo CB Fitwear 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0b0f1a;
            --card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        * { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
                              radial-gradient(circle at bottom left, rgba(192, 132, 252, 0.15), transparent);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard-container {
            background: var(--card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container { text-align: center; margin-bottom: 2rem; }
        .logo-container img { max-width: 150px; filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.4)); }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        /* Grid de Fotos */
        .vitrine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 3rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            padding: 10px;
            cursor: pointer;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 1rem;
            margin-bottom: 10px;
        }

        .product-card p { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin: 0; }

        /* Formulário */
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.75rem; color: var(--text-dim); font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; }
        select, input {
            width: 100%; padding: 0.8rem 1rem; background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(51, 65, 85, 0.5); border-radius: 0.8rem; color: white; outline: none;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }

        .result-card {
            display: none; flex-direction: column; align-items: center; padding: 1.5rem;
            background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 1.5rem; margin-top: 1.5rem;
        }

        .price-value { font-size: 2.2rem; font-weight: 800; color: var(--accent); }

        .btn-enviar {
            width: 100%; margin-top: 1.5rem; padding: 1rem; background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white; border: none; border-radius: 1rem; font-weight: 700; cursor: pointer;
        }

        #whatsapp-flutuante {
            position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); z-index: 1000; text-decoration: none; font-size: 30px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="logo-container">
        <img src="logo1.png" alt="Logo CB Fitwear">
    </div>

    <h1>Catálogo de Vendas</h1>

    <div class="vitrine-grid">
        <div class="product-card" onclick="selecionarDaVitrine('CONJUNTO CANELADO')">
            <img src="foto (1).jpeg" alt="Canelado">
            <p>Canelado Terra</p>
        </div>
        <div class="product-card" onclick="selecionarDaVitrine('CONJUNTO LISO')">
            <img src="foto (2).jpeg" alt="Liso">
            <p>Premium Chocolate</p>
        </div>
        <div class="product-card" onclick="selecionarDaVitrine('CONJUNTO PINK')">
            <img src="foto (6).jpeg" alt="Pink">
            <p>Pink Summer</p>
        </div>
        <div class="product-card" onclick="selecionarDaVitrine('CONJUNTO VERDE')">
            <img src="foto (3).jpeg" alt="Verde">
            <p>Militar Soft</p>
        </div>
    </div>

    <form id="vendaForm" method="POST">
        <div class="input-group">
            <label>Nome do Cliente</label>
            <input type="text" name="Nome" id="nome_cliente" placeholder="Seu nome..." required>
        </div>

        <div class="input-group">
            <label>Produto</label>
            <select name="Produto" id="prod" required>
                <option value="" selected disabled>Escolha ou clique na foto acima...</option>
            </select>
        </div>

        <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Tamanho</label>
                <select name="Tamanho" id="tam" disabled required></select>
            </div>
            <div>
                <label>Cor</label>
                <select name="Cor" id="cor" disabled required></select>
            </div>
        </div>

        <div id="result" class="result-card">
            <div style="font-size: 0.7rem; color: var(--text-dim); font-weight: 700;">VALOR DO INVESTIMENTO</div>
            <div class="price-value" id="valor">R$ 0,00</div>
            <div id="estoque-info" style="font-size: 0.8rem; margin-top: 5px;">Estoque: <span id="qtd-estoque">0</span></div>
        </div>

        <button type="submit" class="btn-enviar" id="btnEnviar">Finalizar Pedido por E-mail</button>
    </form>
</div>

<a href="https://wa.me/SEUNUMEROAQUI" id="whatsapp-flutuante" target="_blank">🟢</a>

<script>
const SHEET_ID = '10PHxjW6F-roUMump4IkhLF4UG0kB_yvX'; 
const SHEET_NAME = 'cbfitwear'; 
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

let dados = [];
const selProd = document.getElementById('prod');
const selTam = document.getElementById('tam');
const selCor = document.getElementById('cor');
const cardResult = document.getElementById('result');

async function carregarDados() {
    try {
        const response = await fetch(URL);
        const text = await response.text();
        const json = JSON.parse(text.substr(47).slice(0, -2));
        dados = json.table.rows.map(row => ({
            p: row.c[0]?.v || '', t: row.c[1]?.v || '', 
            c: row.c[2]?.v || '', v: row.c[3]?.v || 0, e: row.c[4]?.v || 0
        }));
        init();
    } catch (e) { console.error("Erro planilha:", e); }
}

function init() {
    const produtos = [...new Set(dados.map(i => i.p))].sort();
    selProd.innerHTML = '<option value="" disabled selected>Selecione o produto...</option>';
    produtos.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        selProd.appendChild(opt);
    });
}

function selecionarDaVitrine(nomeProd) {
    selProd.value = nomeProd;
    selProd.dispatchEvent(new Event('change'));
    document.getElementById('vendaForm').scrollIntoView({ behavior: 'smooth' });
}

// Lógica de cascata original mantida para funcionalidade
selProd.addEventListener('change', () => {
    const filtrados = dados.filter(d => d.p === selProd.value);
    const tamanhos = [...new Set(filtrados.map(d => d.t))].sort();
    selTam.innerHTML = '<option value="" disabled selected>Tam...</option>';
    tamanhos.forEach(t => { selTam.innerHTML += `<option value="${t}">${t}</option>`; });
    selTam.disabled = false;
    cardResult.style.display = 'none';
});

selTam.addEventListener('change', () => {
    const filtrados = dados.filter(d => d.p === selProd.value && d.t === selTam.value);
    const cores = [...new Set(filtrados.map(d => d.c))].sort();
    selCor.innerHTML = '<option value="" disabled selected>Cor...</option>';
    cores.forEach(c => { selCor.innerHTML += `<option value="${c}">${c}</option>`; });
    selCor.disabled = false;
});

selCor.addEventListener('change', () => {
    const item = dados.find(d => d.p === selProd.value && d.t === selTam.value && d.c === selCor.value);
    if(item) {
        document.getElementById('valor').textContent = `R$ ${item.v.toFixed(2).replace('.',',')}`;
        document.getElementById('qtd-estoque').textContent = item.e;
        cardResult.style.display = 'flex';
    }
});

window.onload = carregarDados;
</script>
</body>
</html>
