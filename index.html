<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Vendas - CB Fitwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group { margin-bottom: 1.2rem; }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.6rem;
            color: var(--text-dim);
            font-weight: 700;
        }

        select, input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.8rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        .result-card {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--accent);
            border-radius: 1.2rem;
            text-align: center;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        .btn-enviar {
            width: 100%;
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            display: none; 
        }

        .btn-enviar:hover { opacity: 0.9; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .price-label { color: var(--text-dim); font-size: 0.8rem; }
        .price-value { font-size: 2.2rem; font-weight: 800; color: var(--accent); }

        .footer-info {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>Catálogo de Preços</h1>

    <form action="" method="POST" id="vendaForm">
        <div class="input-group">
            <label>Nome do Cliente</label>
            <input type="text" name="Nome" id="nome_cliente" placeholder="Digite o nome..." required>
        </div>

        <div class="input-group">
            <label>Telefone / WhatsApp</label>
            <input type="tel" name="Telefone" id="tel_cliente" placeholder="(00) 00000-0000" required>
        </div>

        <div class="input-group">
            <label>Produto</label>
            <select name="Produto" id="prod" required>
                <option value="" selected disabled>Escolha o produto...</option>
            </select>
        </div>

        <div class="input-group">
            <label>Tamanho</label>
            <select name="Tamanho" id="tam" disabled required>
                <option value="">Aguardando produto...</option>
            </select>
        </div>

        <div class="input-group">
            <label>Cor</label>
            <select name="Cor" id="cor" disabled required>
                <option value="">Aguardando tamanho...</option>
            </select>
        </div>

        <input type="hidden" name="Valor_Venda" id="hidden_valor">
        <input type="hidden" name="_captcha" value="false">

        <div id="result" class="result-card">
            <div class="price-label">Valor de Venda</div>
            <div class="price-value" id="valor">R$ 0,00</div>
        </div>

        <button type="submit" class="btn-enviar" id="btnEnviar">Enviar Pedido por E-mail</button>
    </form>

    <div class="footer-info">Base de dados completa (58 variações)</div>
</div>

<script>
    const dados = [
        {p:"Bermuda com bolso", t:"Grande", c:"Azul Piscina", v:40},
        {p:"Bermuda com bolso", t:"Grande", c:"Rosa Pink", v:40},
        {p:"Bermuda com bolso", t:"Grande", c:"Bordo", v:40},
        {p:"Bermuda com bolso", t:"Médio", c:"Rosa Claro", v:40},
        {p:"Bermuda com bolso", t:"Médio", c:"Rosa Pink", v:40},
        {p:"Bermuda sem bolso", t:"Grande", c:"Cinza", v:30},
        {p:"Bermuda sem bolso", t:"Grande", c:"Rosa Pink", v:30},
        {p:"Bermuda sem bolso", t:"Médio", c:"Azul Claro", v:30},
        {p:"Bermuda sem bolso", t:"Médio", c:"Azul Escuro", v:30},
        {p:"Bermuda sem bolso", t:"Médio", c:"Roxo", v:30},
        {p:"Bermuda sem bolso", t:"Médio", c:"Verde", v:30},
        {p:"Calça com bolso", t:"Grande", c:"Azul Marinho", v:55},
        {p:"Calça com bolso", t:"Médio", c:"Preto", v:55},
        {p:"Calça sem bolso suplex G1", t:"Grande", c:"Preto", v:45},
        {p:"Calça sem bolso suplex", t:"Grande", c:"Preto", v:45},
        {p:"Calça sem bolso suplex", t:"Grande", c:"Lilás", v:45},
        {p:"Calça sem bolso suplex", t:"Médio", c:"Preto", v:45},
        {p:"Calça sem bolso suplex", t:"Médio", c:"Verde", v:45},
        {p:"Calça sem bolso suplex", t:"Médio", c:"Marrom", v:45},
        {p:"Calça sem bolso suplex", t:"Médio", c:"Bordo", v:45},
        {p:"Calça sem bolso suplex", t:"Médio", c:"Lilás", v:45},
        {p:"Camiseta dry fit", t:"Grande", c:"Branco", v:60},
        {p:"Camiseta dry fit", t:"Grande", c:"Azul Claro", v:60},
        {p:"Camiseta dry fit", t:"Grande", c:"Preto", v:60},
        {p:"Camiseta dry fit", t:"Grande", c:"Rosa", v:60},
        {p:"Conjunto bicolor poliamida", t:"Grande", c:"Roxo", v:90},
        {p:"Conjunto bicolor poliamida", t:"Médio", c:"Verde", v:90},
        {p:"Conjunto bicolor poliamida", t:"Médio", c:"Marrom", v:90},
        {p:"Conjunto unicolor poliamida", t:"Grande", c:"Marrom", v:90},
        {p:"Conjunto unicolor poliamida", t:"Grande", c:"Preto", v:90},
        {p:"Conjunto unicolor poliamida", t:"Grande", c:"Cinza", v:90},
        {p:"Macacão bicolor", t:"Grande", c:"Marrom", v:100},
        {p:"Macacão bicolor", t:"Grande", c:"Preto", v:100},
        {p:"Macacão bicolor", t:"Grande", c:"Azul Marinho", v:100},
        {p:"Macacão com manga", t:"Grande", c:"Azul Marinho", v:100},
        {p:"Macacão com manga", t:"Grande", c:"Marrom", v:100},
        {p:"Macacão sem manga", t:"Grande", c:"Preto", v:100},
        {p:"Macacão sem manga", t:"Grande", c:"Marrom", v:100},
        {p:"Top Alcina", t:"Grande", c:"Bordo", v:30},
        {p:"Top Alcina", t:"Grande", c:"Rosa Pink", v:30},
        {p:"Top Alcina", t:"Grande", c:"Preto", v:30},
        {p:"Top Alcina", t:"Grande", c:"Verde", v:30},
        {p:"Top Alcina", t:"Grande", c:"Lilás", v:30},
        {p:"Top Alcina", t:"Grande", c:"Marrom", v:30},
        {p:"Top Alcina", t:"Grande", c:"Cinza", v:30},
        {p:"Top Alcina", t:"Médio", c:"Lilás", v:30},
        {p:"Top Alcina", t:"Médio", c:"Azul Claro", v:30},
        {p:"Top Alcina", t:"Médio", c:"Azul Piscina", v:30},
        {p:"Top Alcina", t:"Médio", c:"Bordo", v:30},
        {p:"Top Alcina", t:"Médio", c:"Preto", v:30},
        {p:"Top Alcina", t:"Médio", c:"Rosa Pink", v:30},
        {p:"Top Alcina", t:"Médio", c:"Roxo", v:30},
        {p:"Top Nadador", t:"Médio", c:"Azul Escuro", v:30},
        {p:"Top Nadador", t:"Médio", c:"Bordo", v:30},
        {p:"Top Nadador", t:"Médio", c:"Rosa Claro", v:30},
        {p:"Top Nadador", t:"Médio", c:"Roxo", v:30},
        {p:"Top Nadador", t:"Médio", c:"Verde", v:30}
    ];

    const selProd = document.getElementById('prod');
    const selTam = document.getElementById('tam');
    const selCor = document.getElementById('cor');
    const cardResult = document.getElementById('result');
    const txtValor = document.getElementById('valor');
    const hiddenValor = document.getElementById('hidden_valor');
    const btnEnviar = document.getElementById('btnEnviar');
    const formulario = document.getElementById('vendaForm');

    function init() {
        const produtosUnicos = [...new Set(dados.map(item => item.p))].sort();
        produtosUnicos.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.textContent = p;
            selProd.appendChild(opt);
        });
    }

    selProd.addEventListener('change', () => {
        const prod = selProd.value;
        const tamanhos = [...new Set(dados.filter(d => d.p === prod).map(d => d.t))].sort();
        selTam.innerHTML = '<option value="" selected disabled>Selecione...</option>';
        tamanhos.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            selTam.appendChild(opt);
        });
        selTam.disabled = false;
        selCor.disabled = true;
        selCor.innerHTML = '<option value="">Aguardando...</option>';
        cardResult.style.display = 'none';
        btnEnviar.style.display = 'none';
    });

    selTam.addEventListener('change', () => {
        const prod = selProd.value;
        const tam = selTam.value;
        const cores = [...new Set(dados.filter(d => d.p === prod && d.t === tam).map(d => d.c))].sort();
        selCor.innerHTML = '<option value="" selected disabled>Selecione...</option>';
        cores.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            selCor.appendChild(opt);
        });
        selCor.disabled = false;
        cardResult.style.display = 'none';
        btnEnviar.style.display = 'none';
    });

    selCor.addEventListener('change', () => {
        const item = dados.find(d => 
            d.p === selProd.value && d.t === selTam.value && d.c === selCor.value
        );
        if (item) {
            const valorFormatado = `R$ ${item.v.toFixed(2).replace('.', ',')}`;
            txtValor.textContent = valorFormatado;
            hiddenValor.value = valorFormatado;
            cardResult.style.display = 'block';
            btnEnviar.style.display = 'block';
        }
    });

    formulario.addEventListener('submit', function(e) {
    // 1. Configura o destino do e-mail
    const emailDestino = "edugc73@gmail.com"; 
    this.action = `https://formsubmit.co/${emailDestino}`;

    // 2. Pequeno delay para garantir que o navegador inicie o envio antes de mudar a tela
    setTimeout(() => {
        mostrarAgradecimento();
    }, 500);
});

function mostrarAgradecimento() {
    // Aplica o fundo azul escuro total na tela
    document.body.innerHTML = `
        <div style="
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw; 
            background-color: #0f172a; 
            color: #f8fafc; 
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.8s ease-in-out;
        ">
            <div style="font-size: 5rem; margin-bottom: 20px;">✅</div>
            <h1 style="
                font-size: 2.5rem; 
                background: linear-gradient(to right, #818cf8, #c084fc);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 10px;
            ">Muito Obrigado!</h1>
            <p style="font-size: 1.2rem; color: #94a3b8; max-width: 400px;">
                Seu pedido foi enviado com sucesso. <br> 
                Em breve a equipe <strong>CB Fitwear</strong> entrará em contato com você!
            </p>
            <button onclick="window.location.reload()" style="
                margin-top: 30px;
                padding: 12px 25px;
                background: #6366f1;
                color: white;
                border: none;
                border-radius: 50px;
                cursor: pointer;
                font-weight: bold;
            ">Voltar ao Catálogo</button>
        </div>
    `;
}};

    init();
</script>

</body>
</html>
