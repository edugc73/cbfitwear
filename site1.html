<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camilla Bilha | Fitwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #0a192f;
            --accent-pink: #d4a373; /* Tom sofisticado para contrastar */
            --white: #ffffff;
            --bg-body: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--dark-blue);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--dark-blue);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo {
            max-width: 180px;
            height: auto;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        /* --- GALERIA --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        /* --- MODAL DE ZOOM --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 85vh;
            border-radius: 5px;
            animation: zoom 0.3s;
        }

        @keyframes zoom {
            from {transform: scale(0)} 
            to {transform: scale(1)}
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- WHATSAPP --- */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            text-decoration: none;
            font-size: 30px;
        }

        /* --- FOOTER --- */
        footer {
            background: var(--dark-blue);
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr 1fr; /* Duas colunas no mobile */
                gap: 10px;
            }
            .product-card img {
                height: 250px;
            }
        }
    </style>
</head>
<body>

<header>
    <img src="LOGO2.jpeg" alt="Camilla Bilha Logo" class="logo">
</header>

<div class="container">
    <h2>Coleção Exclusive</h2>
    
    <div class="gallery">
        <div class="product-card" onclick="openModal(this)">
            <img src="foto (2).jpg" alt="Conjunto Marrom">
        </div>
        <div class="product-card" onclick="openModal(this)">
            <img src="foto (3).jpg" alt="Conjunto Verde Oliva">
        </div>
        <div class="product-card" onclick="openModal(this)">
            <img src="foto (4).jpeg" alt="Conjunto Azul Marinho">
        </div>
        <div class="product-card" onclick="openModal(this)">
            <img src="foto (6).jpeg" alt="Conjunto Pink">
        </div>
        <div class="product-card" onclick="openModal(this)">
            <img src="foto (7).jpeg" alt="Conjunto Vinho">
        </div>
        <div class="product-card" onclick="openModal(this)">
            <img src="foto (10).jpeg" alt="Body Marrom Detalhe Branco">
        </div>
        <div class="product-card" onclick="openModal(this)">
            <img src="foto (9).jpeg" alt="Conjunto Rosa Neon">
        </div>
    </div>
</div>

<div id="myModal" class="modal" onclick="closeModal()">
    <span class="close">&times;</span>
    <img class="modal-content" id="img01">
</div>

<a href="https://wa.me/SEUNUMERO" class="whatsapp-float" target="_blank">
    <i>WA</i>
</a>

<footer>
    <p>&copy; 2026 Camilla Bilha Fitwear. Todos os direitos reservados.</p>
</footer>

<script>
    function openModal(element) {
        var modal = document.getElementById("myModal");
        var modalImg = document.getElementById("img01");
        var fullImg = element.getElementsByTagName('img')[0].src;
        
        modal.style.display = "block";
        modalImg.src = fullImg;
    }

    function closeModal() {
        document.getElementById("myModal").style.display = "none";
    }
</script>

</body>
</html>
